<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout/head :: head-main(~{})">
</head>

<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">

    <!-- Header Navigation -->
    <div th:replace="layout/header :: header-main"></div>

    <main class="max-w-4xl mx-auto px-6 py-12 md:py-20 animate-fade-in flex flex-col items-center">
        <div class="w-full max-w-[480px] auth-card">
            
            <!-- Welcome Section -->
            <div class="flex flex-col gap-2 mb-8 text-center">
                <h1 class="auth-header-title">Recuperar contraseña</h1>
                <p class="auth-header-desc">Ingresa tu correo y te enviaremos un enlace para restaurar tu contraseña.</p>
            </div>

            <!-- Form Section -->
            <form class="flex flex-col gap-6" id="recover-form">
                <div class="flex flex-col gap-2">
                    <label class="auth-label" for="email">Correo electrónico</label>
                    <input class="auth-input" id="email" placeholder="nombre@empresa.com" type="email" required/>
                </div>
                <button class="btn-auth-primary" type="submit">
                    Enviar enlace
                </button>
            </form>

            <!-- Footer -->
            <div class="mt-8 flex justify-center gap-2 text-sm text-slate-500 dark:text-slate-400 border-t border-slate-100 dark:border-slate-800 pt-6">
                <p>¿Recordaste tu contraseña?</p>
                <a class="font-semibold text-primary hover:underline transition-colors" th:href="@{/auth/login}">Iniciar sesión</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div th:replace="layout/footer :: footer-main"></div>

    <script th:src="@{/js/taiwind-config.js}"></script>
</body>
</html>
