<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout/head :: head-main(~{})">
</head>

<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">

    <!-- Header Navigation -->
    <div th:replace="layout/header :: header-main"></div>

    <main class="max-w-4xl mx-auto px-6 py-12 md:py-20 animate-fade-in flex flex-col items-center">
        <div class="w-full max-w-[480px] auth-card">
            
            <!-- Header Section -->
            <div class="flex flex-col gap-2 mb-8 text-center">
                <h1 class="auth-header-title">Nueva contraseña</h1>
                <p class="auth-header-desc">Crea una contraseña segura para proteger tu cuenta.</p>
            </div>

            <!-- Form Section -->
            <form class="flex flex-col gap-6" id="reset-password-form">
                <div class="flex flex-col gap-2">
                    <label class="auth-label" for="password">Nueva contraseña</label>
                    <div class="relative group">
                        <input class="auth-input pr-12" id="password" placeholder="Mínimo 8 caracteres" type="password" required/>
                        <div class="absolute right-0 top-0 h-full flex items-center pr-4 text-slate-400 cursor-pointer hover:text-primary transition-colors" id="toggle-password">
                            <span class="material-symbols-outlined text-[20px]">visibility_off</span>
                        </div>
                    </div>
                    <!-- Password Checklist -->
                    <div class="flex flex-col gap-2 mt-2 px-1">
                        <div id="check-length" class="flex items-center gap-2 text-[12px] text-slate-500">
                            <span class="material-symbols-outlined text-[16px]">close</span>
                            <span>Mínimo 8 caracteres</span>
                        </div>
                        <div id="check-upper" class="flex items-center gap-2 text-[12px] text-slate-500">
                            <span class="material-symbols-outlined text-[16px]">close</span>
                            <span>Al menos una letra mayúscula</span>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="auth-label" for="password-confirm">Confirmar contraseña</label>
                    <div class="relative group">
                        <input class="auth-input pr-12" id="password-confirm" placeholder="Repite tu contraseña" type="password" required/>
                        <div class="absolute right-0 top-0 h-full flex items-center pr-4 text-slate-400 cursor-pointer hover:text-primary transition-colors" id="toggle-confirm">
                            <span class="material-symbols-outlined text-[20px]">visibility_off</span>
                        </div>
                    </div>
                    <div id="check-match" class="flex items-center gap-2 text-[12px] text-slate-500 mt-2 px-1">
                        <span class="material-symbols-outlined text-[16px]">close</span>
                        <span>Las contraseñas coinciden</span>
                    </div>
                </div>

                <button id="btn-submit" class="btn-auth-primary mt-4" type="submit">
                    Guardar y continuar
                </button>
            </form>

            <!-- Footer -->
            <div class="mt-8 flex justify-center gap-2 text-sm text-slate-500 dark:text-slate-400 border-t border-slate-100 dark:border-slate-800 pt-6">
                <p>¿Recordaste tu contraseña?</p>
                <a class="font-semibold text-primary hover:underline transition-colors" th:href="@{/auth/login}">Volver al inicio</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div th:replace="layout/footer :: footer-main"></div>

    <script th:src="@{/js/reset_password.js}"></script>
    <script th:src="@{/js/taiwind-config.js}"></script>
</body>
</html>
