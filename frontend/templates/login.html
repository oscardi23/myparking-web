<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout/head :: head-main(~{})">
</head>

<body>

    <div class="content-main-login">
        <!-- Panel Lateral -->
        <div th:replace="layout/left-panel :: left-panel-login" class="auth-side-panel"></div>

        <div class="content-login-form">
            <!-- Mobile Logo -->
            <div class="lg:hidden flex flex-col items-center gap-3 mb-8">
                <div class="flex h-12 w-12 items-center justify-center rounded-lg bg-primary text-white shadow-lg shadow-primary/30">
                    <span class="material-symbols-outlined text-3xl">local_parking</span>
                </div>
                <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">MyParking</span>
            </div>

            <div class="w-full max-w-[400px]">
                <!-- Header Section -->
                <div class="flex flex-col gap-2 mb-8">
                    <h1 class="auth-header-title">Inicia sesión</h1>
                    <p class="auth-header-desc">¡Bienvenido de nuevo! Por favor ingrese sus datos.</p>
                </div>

                <!-- Form Section -->
                <form class="flex flex-col gap-5" th:action="@{/login}" method="post">
                    <div class="flex flex-col gap-1">
                        <label class="auth-label" for="email">Correo electrónico</label>
                        <input class="auth-input auth-input-lg" id="email" name="username" placeholder="nombre@empresa.com" type="email" required/>
                    </div>

                    <div class="flex flex-col gap-1">
                        <label class="auth-label" for="password">Contraseña</label>
                        <div class="relative group">
                            <input class="auth-input auth-input-lg pr-12" id="password" name="password" placeholder="Ingrese su contraseña" type="password" required/>
                            <div class="absolute right-0 top-0 h-full flex items-center pr-4 text-slate-400 cursor-pointer hover:text-primary transition-colors" id="toggle-password">
                                <span class="material-symbols-outlined text-[24px]">visibility_off</span>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center justify-end mt-1">
                        <a class="text-sm font-semibold text-primary hover:underline transition-colors" th:href="@{/auth/recover_password}">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button class="btn-auth-primary mt-2" type="submit">
                        Iniciar Sesión
                    </button>
                </form>

                <!-- Footer -->
                <div class="flex justify-center gap-2 mt-8 text-sm font-normal text-slate-500 dark:text-slate-400 border-t border-slate-100 dark:border-slate-800 pt-6">
                    <p>¿No tienes una cuenta?</p>
                    <a class="font-semibold text-primary hover:underline transition-colors" th:href="@{/auth/register}">Registrarse</a>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/login.js}"></script>
    <script th:src="@{/js/taiwind-config.js}"></script>

</body>
</html>
