<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">


<head th:replace="layout/head :: head-main(title='Inicio')">

</head>
<body>

<div class="content-main">
    <div th:replace="/layout/left-panel :: left-panel-login"
         class="w-full max-w-[480px] flex flex-col gap-8 py-8"></div>
    <div class="content-form">
        <!-- Mobile Logo -->
        <div class="lg:hidden flex flex-col items-center gap-3 mb-2">
            <div class="flex h-12 w-12 items-center justify-center rounded-lg bg-primary text-white shadow-lg shadow-primary/30">
                <span class="material-symbols-outlined text-3xl">local_parking</span>
            </div>
            <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">MyParking</span>
        </div>

        <!-- Header Section -->
        <div class="flex flex-col gap-2  ">
            <h1 class="text-[#0d131b] dark:text-white tracking-tight text-[32px] font-bold leading-tight text-center">Inicia sesión
                </h1>
            <p class="text-[#4c6c9a] dark:text-slate-400 text-sm font-normal leading-normal">Bienvenido de nuevo! Por
                favor ingrese sus datos.</p>
        </div>

        <!-- invalid credentials -->
        <div th:if="${error}"
             class="flex items-center gap-3 bg-red-50 border border-red-200 text-red-600 text-sm font-medium px-4 py-3 rounded-lg">
            <span class="material-symbols-outlined text-[18px]">error</span>
            <span th:text="${error}"></span>
        </div>

        <!-- user logout-->
        <div th:if="${msg}"
             class="flex items-center gap-3 bg-green-50 border border-green-200 text-green-600 text-sm font-medium px-4 py-3 rounded-lg">
            <span class="material-symbols-outlined text-[18px]">check_circle</span>
            <span th:text="${msg}"></span>
        </div>

        <!-- Form Section -->
        <form class="flex w-full max-w-md flex-col gap-5" th:action="@{/auth/login}" method="post">
            <div class="flex flex-col gap-2">
                <label class="text-[#0d131b] dark:text-white text-base font-medium leading-normal" for="email">Correo
                    electrónico</label>
                <input class="form-input flex w-full min-w-0 resize-none overflow-hidden rounded-lg text-[#0d131b] dark:text-white focus:outline-0 focus:ring-0 border border-[#cfd9e7] dark:border-slate-600 bg-slate-50 dark:bg-slate-800 focus:border-primary focus:shadow-[0_0_0_2px_rgba(19,109,236,0.2)] h-14 placeholder:text-[#4c6c9a] p-[15px] text-base font-normal leading-normal transition-all duration-200"
                       id="email" placeholder="nombre@empresa.com" type="email" name="username"/>
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-[#0d131b] dark:text-white text-base font-medium leading-normal" for="password">Contraseña</label>
                <div class="flex w-full items-stretch rounded-lg relative group">
                    <input class="form-input flex w-full min-w-0 resize-none overflow-hidden rounded-lg text-[#0d131b] dark:text-white focus:outline-0 focus:ring-0 border border-[#cfd9e7] dark:border-slate-600 bg-slate-50 dark:bg-slate-800 focus:border-primary focus:shadow-[0_0_0_2px_rgba(19,109,236,0.2)] h-14 placeholder:text-[#4c6c9a] p-[15px] pr-12 text-base font-normal leading-normal transition-all duration-200"
                           id="password" placeholder="Ingrese su contraseña" type="password" name="password"/>
                    <div class="absolute right-0 top-0 h-full flex items-center pr-[15px] text-[#4c6c9a] cursor-pointer hover:text-primary transition-colors"
                         id="toggle-password">
                        <span class="material-symbols-outlined text-[24px]">visibility_off</span>
                    </div>
                </div>
            </div>
            <div class="flex flex-wrap items-center justify-between gap-3 mt-1">
                <a class="text-sm font-semibold text-primary hover:text-blue-700 transition-colors"
                   th:href="@{/auth/forgot-password}" >¿Olvidaste tu contraseña?</a>
            </div>
            <button class="mt-4 flex w-full items-center justify-center rounded-lg bg-primary py-4 px-5 text-base font-bold leading-normal text-white shadow-md hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-all duration-200 transform active:scale-[0.99]"
                    type="submit">
                Iniciar
            </button>
        </form>


        <!-- Footer -->
        <div class="flex justify-center gap-2 text-base font-normal leading-normal text-[#4c6c9a] dark:text-slate-400">
            <p>¿No tienes una cuenta?</p>
            <a class="font-semibold text-primary hover:text-blue-700 transition-colors" th:href="@{/auth/register}">Registrarse</a>
        </div>
    </div>

</div>


<script th:src="@{/js/login.js}"></script>
<script th:src="@{/js/taiwind-config.js}"></script>

</body>
</html>
